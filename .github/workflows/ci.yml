name: CI

on:
  push:
    branches: [main]
    paths:
      - "lore_memory/**"
      - "tests/**"
      - "benchmarks/**"
      - "mcp/**"
      - "api/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "lore_memory/**"
      - "tests/**"
      - "benchmarks/**"
      - "mcp/**"
      - "api/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short -x -m "not slow"

      - name: Run benchmarks (smoke test)
        run: python benchmarks/lore_bench.py
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        continue-on-error: true
