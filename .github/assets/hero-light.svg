<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#eef0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8f9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A5BFF" />
      <stop offset="50%" style="stop-color:#8B5CF6" />
      <stop offset="100%" style="stop-color:#5A5BFF" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5BFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#5A5BFF;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" fill="url(#bg)" stroke="#e0e0f0" stroke-width="1" />

  <!-- Glow effects -->
  <ellipse cx="450" cy="100" rx="300" ry="100" fill="url(#glow)" filter="url(#blur)" />

  <!-- Accent line -->
  <rect x="350" y="10" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.6" />

  <!-- Logo circle -->
  <circle cx="450" cy="80" r="28" fill="none" stroke="url(#accent)" stroke-width="2.5" />
  <path d="M450 62 L450 80 L464 88" fill="none" stroke="#8B5CF6" stroke-width="2.5" stroke-linecap="round" />

  <!-- Title -->
  <text x="450" y="140" text-anchor="middle" fill="#1a1a2e" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="42" font-weight="700" letter-spacing="2">LoreMem</text>

  <!-- Subtitle -->
  <text x="450" y="175" text-anchor="middle" fill="#555577" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-weight="400" letter-spacing="1">Persistent Memory for AI Agents</text>

  <!-- Tagline -->
  <text x="450" y="210" text-anchor="middle" fill="#5A5BFF" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="500" letter-spacing="3">NO LLM  ·  NO CLOUD  ·  NO COST</text>

  <!-- Bottom accent -->
  <rect x="350" y="267" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.6" />
</svg>
