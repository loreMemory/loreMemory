<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a" />
      <stop offset="100%" style="stop-color:#111133" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5BFF" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5A5BFF;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#5A5BFF;stop-opacity:0" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)" />

  <!-- Glow -->
  <ellipse cx="256" cy="220" rx="180" ry="120" fill="url(#glow)" filter="url(#blur)" />

  <!-- Clock/Memory icon -->
  <circle cx="256" cy="210" r="100" fill="none" stroke="url(#accent)" stroke-width="8" />

  <!-- Clock hands -->
  <line x1="256" y1="210" x2="256" y2="145" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round" />
  <line x1="256" y1="210" x2="300" y2="240" stroke="#5A5BFF" stroke-width="8" stroke-linecap="round" />

  <!-- Center dot -->
  <circle cx="256" cy="210" r="8" fill="#8B5CF6" />

  <!-- Three small dots (memory nodes) -->
  <circle cx="180" cy="350" r="10" fill="#5A5BFF" opacity="0.6" />
  <circle cx="256" cy="370" r="10" fill="#8B5CF6" opacity="0.8" />
  <circle cx="332" cy="350" r="10" fill="#5A5BFF" opacity="0.6" />

  <!-- Connection lines (memory graph) -->
  <line x1="190" y1="350" x2="246" y2="370" stroke="#5A5BFF" stroke-width="2" opacity="0.4" />
  <line x1="266" y1="370" x2="322" y2="350" stroke="#5A5BFF" stroke-width="2" opacity="0.4" />
  <line x1="256" y1="310" x2="180" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3" />
  <line x1="256" y1="310" x2="332" y2="340" stroke="#8B5CF6" stroke-width="2" opacity="0.3" />
  <line x1="256" y1="310" x2="256" y2="360" stroke="#8B5CF6" stroke-width="2" opacity="0.3" />

  <!-- Text -->
  <text x="256" y="445" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="48" font-weight="700" letter-spacing="3">LoreMem</text>
</svg>
